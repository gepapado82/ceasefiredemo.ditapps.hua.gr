# Workflow for building and deploying a Quasar app to GitHub Pages
name: Deploy Quasar app to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./quasar-project
        run: npm install

      - name: Build the Quasar app
        working-directory: ./quasar-project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This points to the compiled Quasar output
          path: './quasar-project/dist/spa'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
